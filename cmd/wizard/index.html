<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Wizard</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-header">
            <h1 class="navbar-title">Anna: Setup Wizard</h1>
            <div class="progress-circle">
                <div class="progress"></div>
                <span class="emoji">🍚</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="wizard">
            <div class="slide">
                <h2>Setup your anna site</h2>
                <input type="text" placeholder="Enter an author name">
                <button onclick="nextSlide()">Next</button>
            </div>
            <div class="slide">
                <h2>Name your site</h2>
                <input type="text" placeholder="ex: my blog">
                <button onclick="nextSlide()">Next</button>
            </div>
            <div class="slide">
                <h2>Enter a domain name</h2>
                <input type="text" placeholder="ex: https://anna.github.io">
                <button onclick="submitForm()">Submit</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
